name: Ted $€” surface threads

# Two-phase daily flow:
#   1. Scan Clubhouse threads in the last 48h and draft up to 2 candidate
#      surface replies (tag / link / summary) into ted_surface_drafts.
#   2. Post any drafts a human has approved via /admin/ted/surfaces.
# Gate: post phase is skipped if ted_kill_switch.surface_threads_enabled=false.
# Runs at 13:00 UTC $‰ˆ 14:00 Dublin year-round with $±1h DST drift.

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run $€” scan + generate, don't post"
        required: false
        default: "false"
      max:
        description: "Max drafts this run"
        required: false
        default: "2"

jobs:
  surface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Draft candidate surfaces
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TED_ADMIN_ALERT_EMAIL: ${{ secrets.TED_ADMIN_ALERT_EMAIL }}
          TED_ALERT_FROM: ${{ secrets.TED_ALERT_FROM }}
          SKOOL_EMAIL: ${{ secrets.SKOOL_EMAIL }}
          SKOOL_PASSWORD: ${{ secrets.SKOOL_PASSWORD }}
          SKOOL_COMMUNITY_SLUG: ${{ secrets.SKOOL_COMMUNITY_SLUG }}
        run: |
          ARGS="--job=draft-surfaces --max=${{ inputs.max || '2' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          npx tsx agents/ted/src/index.ts $ARGS

      - name: Post human-approved surfaces
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TED_ADMIN_ALERT_EMAIL: ${{ secrets.TED_ADMIN_ALERT_EMAIL }}
          TED_ALERT_FROM: ${{ secrets.TED_ALERT_FROM }}
          SKOOL_EMAIL: ${{ secrets.SKOOL_EMAIL }}
          SKOOL_PASSWORD: ${{ secrets.SKOOL_PASSWORD }}
          SKOOL_COMMUNITY_SLUG: ${{ secrets.SKOOL_COMMUNITY_SLUG }}
        run: |
          ARGS="--job=post-surfaces"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          npx tsx agents/ted/src/index.ts $ARGS

      - name: Upload screenshots + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ted-surface-logs
          path: logs/ted/
          retention-days: 14
