name: Ted — post daily prompt

# Posts the next approved daily prompt to Skool. Needs Playwright.
# Gate: skipped if ted_kill_switch.post_prompt_enabled=false (shadow mode).
# Runs at 06:30 UTC ≈ 07:30 Dublin year-round with ±1h DST drift.

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — login + navigate + screenshot, no submit"
        required: false
        default: "false"

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Post prompt
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TED_ADMIN_ALERT_EMAIL: ${{ secrets.TED_ADMIN_ALERT_EMAIL }}
          TED_ALERT_FROM: ${{ secrets.TED_ALERT_FROM }}
          SKOOL_EMAIL: ${{ secrets.SKOOL_EMAIL }}
          SKOOL_PASSWORD: ${{ secrets.SKOOL_PASSWORD }}
          SKOOL_COMMUNITY_SLUG: ${{ secrets.SKOOL_COMMUNITY_SLUG }}
        run: |
          ARGS="--job=post-prompt"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          npx tsx agents/ted/src/index.ts $ARGS

      - name: Upload screenshots + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ted-post-prompt-logs
          path: logs/ted/
          retention-days: 14
