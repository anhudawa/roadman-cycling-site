name: SEO QA Audit

on:
  push:
    paths:
      - "content/blog/**"
      - "content/podcast/**"
      - "src/app/**/page.tsx"
      - "src/lib/topics.ts"
      - "src/lib/glossary.ts"
      - "src/lib/comparisons.ts"
  pull_request:
    paths:
      - "content/blog/**"
      - "content/podcast/**"

jobs:
  seo-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run SEO QA audit
        run: npx tsx scripts/seo-qa-audit.ts
      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-qa-results
          path: docs/seo/qa-audit-results.csv
